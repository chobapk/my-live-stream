<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Player</title>
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.3.0/dist/shaka-player.compiled.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        video { width: 100vw; height: 100vh; background: #000; }
    </style>
</head>
<body>
    <video id="video" controls autoplay playsinline></video>
    <script>
        async function init() {
            const video = document.getElementById('video');
            const player = new shaka.Player(video);
            // ใส่ลิงก์ .mpd ของคุณที่นี่
            const manifestUri = 'https://cri-streamer3.cdn.3bbtv.com:8443/3bb/live/29/29.mpd';
            await player.load(manifestUri);
        }
        init();
    </script>
</body>
</html>
